services:

  db:
    build: ./src/database
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - .data/postgres:/var/lib/postgresql/data
    restart: always

  crawler:
    build: ./src/crawler
    ports:
      - 8000:8000
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
    restart: always
    depends_on:
      - db
